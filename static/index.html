<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Editor — Vincent ICT</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    (function(){var t=localStorage.getItem('vict-theme');
    if(!t)t='dark';
    document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <header>
    <div class="header-inner">
      <img src="https://vincent-ict.nl/wp-content/uploads/2026/03/cropped-logogradient-2.png"
           alt="Vincent ICT" class="logo" />
      <h1>PDF Editor</h1>
      <button id="theme-toggle" class="btn-icon" title="Thema wisselen">
        <span class="icon-sun">&#9788;</span>
        <span class="icon-moon">&#9790;</span>
      </button>
    </div>
  </header>

  <div id="app">
    <section id="upload-section">
      <label for="pdf-input" class="btn">Kies PDF</label>
      <input type="file" id="pdf-input" accept=".pdf" hidden />
      <span id="file-name">Geen bestand gekozen</span>
      <button id="upload-btn" class="btn primary" disabled>Uploaden &amp; Bewerken</button>
    </section>

    <div id="loading" hidden>
      <div class="spinner"></div>
      PDF wordt omgezet, even geduld…
    </div>

    <section id="editor-section" hidden>
      <div id="toolbar">
        <button data-cmd="bold" title="Vet"><b>B</b></button>
        <button data-cmd="italic" title="Cursief"><i>I</i></button>
        <button data-cmd="underline" title="Onderstrepen"><u>U</u></button>
        <span class="separator"></span>
        <input type="color" id="color-picker" value="#000000" title="Tekstkleur" />
        <span class="separator"></span>
        <button id="reset-btn" class="btn" title="Alle bewerkingen ongedaan maken">Opnieuw</button>
        <button id="save-btn" class="btn primary">Download PDF</button>
      </div>
      <div id="editor"></div>
    </section>
  </div>

  <script src="/static/editor.js"></script>
</body>
</html>
